<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>貳壹 — 出席調查</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #111; font-family: 'Noto Sans TC', sans-serif; font-weight: 300; min-height: 100vh; padding: 60px 24px 80px; }
    .container { max-width: 560px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 56px; }
    .title { font-family: 'Noto Serif TC', serif; font-weight: 300; font-size: 64px; letter-spacing: 16px; color: #111; line-height: 1; margin-bottom: 16px; }
    .subtitle { font-size: 13px; letter-spacing: 4px; color: #888; text-transform: uppercase; }
    .divider { width: 40px; height: 1px; background: #ddd; margin: 20px auto; }
    .desc { font-size: 14px; color: #666; line-height: 1.8; letter-spacing: 1px; }
    .form-group { margin-bottom: 40px; }
    .question-label { font-size: 15px; font-weight: 500; color: #111; letter-spacing: 1px; margin-bottom: 16px; display: block; }
    .q-number { font-size: 11px; color: #bbb; letter-spacing: 2px; display: block; margin-bottom: 6px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 14px 18px; border: 1px solid #e8e8e8; border-radius: 8px; transition: border-color 0.2s, background 0.2s; font-size: 14px; color: #333; letter-spacing: 0.5px; }
    .option:hover { border-color: #111; background: #fafafa; }
    .option input[type="radio"], .option input[type="checkbox"] { appearance: none; width: 16px; height: 16px; border: 1.5px solid #ccc; border-radius: 50%; flex-shrink: 0; position: relative; transition: border-color 0.2s; }
    .option input[type="checkbox"] { border-radius: 4px; }
    .option input[type="radio"]:checked, .option input[type="checkbox"]:checked { border-color: #111; background: #111; }
    .option input[type="radio"]:checked::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    .option input[type="checkbox"]:checked::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 10px; line-height: 1; }
    .option:has(input:checked) { border-color: #111; background: #f8f8f8; }
    .multi-hint { font-size: 12px; color: #aaa; margin-bottom: 12px; letter-spacing: 1px; }
    textarea { width: 100%; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 18px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: #333; font-weight: 300; letter-spacing: 0.5px; resize: none; outline: none; transition: border-color 0.2s; background: #fff; }
    textarea:focus { border-color: #111; }
    textarea::placeholder { color: #ccc; }
    .section-sep { border: none; border-top: 1px solid #f0f0f0; margin: 48px 0; }
    .submit-wrap { text-align: center; margin-top: 48px; }
    .submit-btn { background: #111; color: #fff; border: none; padding: 16px 48px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; letter-spacing: 4px; cursor: pointer; border-radius: 2px; transition: background 0.2s; }
    .submit-btn:hover { background: #333; }
    .thankyou { display: none; text-align: center; padding: 60px 0; }
    .thankyou.show { display: block; }
    .thankyou-title { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 300; letter-spacing: 8px; margin-bottom: 16px; }
    .thankyou-desc { font-size: 14px; color: #888; letter-spacing: 2px; }
    @media (max-width: 480px) { .title { font-size: 48px; letter-spacing: 12px; } body { padding: 40px 20px 60px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">貳壹</div>
      <div class="divider"></div>
      <div class="subtitle">Birthday Survey</div>
      <br>
      <div class="desc">請填寫以下問卷，協助我們規劃貴一的 21 歲生日會</div>
      <div style="margin-top:16px; font-size:12px; color:#aaa; letter-spacing:1px; line-height:1.8;">為了統計精準，有大機率出席的再填<br>僅為前期調查，填寫不代表正式報名<br>正式報名表單將另行發送</div>
    </div>
    <form id="surveyForm">
      <div class="form-group"><span class="q-number">01</span><span class="question-label">確定會來嗎？</span><div class="options"><label class="option"><input type="radio" name="q1" value="確定來"> 確定來</label><label class="option"><input type="radio" name="q1" value="可能來"> 可能來</label><label class="option"><input type="radio" name="q1" value="無法出席"> 無法出席</label></div></div>
      <div class="form-group"><span class="q-number">02</span><span class="question-label">如何稱呼？</span><textarea name="q_name" rows="1" placeholder="你的名字或暱稱"></textarea></div>
      <div class="form-group"><span class="q-number">03</span><span class="question-label">哪天有空來？</span><div class="options"><label class="option"><input type="radio" name="q2" value="8/29（六）"> 8/29（六）</label><label class="option"><input type="radio" name="q2" value="8/30（日）"> 8/30（日）</label><label class="option"><input type="radio" name="q2" value="兩天都可以"> 兩天都可以</label></div></div>
      <div class="form-group"><span class="q-number">04</span><span class="question-label">會帶伴侶或朋友一起來嗎？</span><div class="options"><label class="option"><input type="radio" name="q3" value="只有我"> 只有我</label><label class="option"><input type="radio" name="q3" value="帶 1 位"> 帶 1 位</label><label class="option"><input type="radio" name="q3" value="帶 2 位以上"> 帶 2 位以上</label></div></div>
      <hr class="section-sep">
      <div class="form-group"><span class="q-number">05</span><span class="question-label">希望派對辦在哪裡？</span><div class="options"><label class="option"><input type="radio" name="q4" value="包場餐廳"> 包場餐廳</label><label class="option"><input type="radio" name="q4" value="私人場地"> 私人場地</label><label class="option"><input type="radio" name="q4" value="KTV"> KTV</label><label class="option"><input type="radio" name="q4" value="戶外"> 戶外</label></div><textarea name="q4_other" rows="2" style="margin-top:10px;" placeholder="或填入其他想法"></textarea></div>
      <div class="form-group"><span class="q-number">06</span><span class="question-label">這次派對每人預算大概多少？</span><div class="options"><label class="option"><input type="radio" name="q5" value="$800 – 1000"> $800 – 1000</label><label class="option"><input type="radio" name="q5" value="$1000 – 1500"> $1000 – 1500</label><label class="option"><input type="radio" name="q5" value="$1500 – 2000"> $1500 – 2000</label><label class="option"><input type="radio" name="q5" value="無上限"> 無上限</label></div></div>
      <div class="form-group"><span class="q-number">07</span><span class="question-label">希望有什麼活動？</span><div class="multi-hint">可多選</div><div class="options"><label class="option"><input type="checkbox" name="q6" value="單純吃飯"> 單純吃飯</label><label class="option"><input type="checkbox" name="q6" value="小遊戲"> 小遊戲</label><label class="option"><input type="checkbox" name="q6" value="表演"> 表演</label><label class="option"><input type="checkbox" name="q6" value="合唱生日歌"> 合唱生日歌</label><label class="option"><input type="checkbox" name="q6" value="抽獎"> 抽獎</label></div><textarea name="q6_other" rows="2" style="margin-top:10px;" placeholder="其他想法？"></textarea></div>
      <hr class="section-sep">
      <div class="form-group"><span class="q-number">08</span><span class="question-label">有沒有食物忌口或過敏？</span><textarea name="q7" rows="3" placeholder="例如：不吃海鮮、花生過敏……或留空跳過"></textarea></div>
      <div class="form-group"><span class="q-number">09</span><span class="question-label">有沒有推薦的場地？</span><textarea name="q8" rows="3" placeholder="歡迎推薦，或留空跳過"></textarea></div>
      <div class="form-group"><span class="q-number">10</span><span class="question-label">有什麼話想對貴一說？</span><textarea name="q9" rows="4" placeholder="什麼都可以寫"></textarea></div>
      <div class="submit-wrap"><button type="submit" class="submit-btn">送出</button></div>
    </form>
    <div class="thankyou" id="thankyou"><div class="thankyou-title">謝謝你</div><div class="divider"></div><div class="thankyou-desc">等你來</div></div>
  </div>
  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
  <script>
    const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSf7yJZ4-UlcJ6VX4HqXg9oU050MhnfaaY0NuZLqhhEq6kee1g/formResponse';
    document.getElementById('surveyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const fields = [];
      const q1 = document.querySelector('input[name="q1"]:checked'); if (q1) fields.push(['entry.374982947', q1.value]);
      const qname = document.querySelector('textarea[name="q_name"]').value.trim(); if (qname) fields.push(['entry.1315673649', qname]);
      const q2 = document.querySelector('input[name="q2"]:checked'); if (q2) fields.push(['entry.250384248', q2.value]);
      const q3 = document.querySelector('input[name="q3"]:checked'); if (q3) fields.push(['entry.374222677', q3.value]);
      const q4 = document.querySelector('input[name="q4"]:checked');
      const q4other = document.querySelector('textarea[name="q4_other"]').value.trim();
      if (q4other) { fields.push(['entry.963026481', '__other_option__']); fields.push(['entry.963026481.other_option_response', q4other]); } else if (q4) { fields.push(['entry.963026481', q4.value]); }
      const q5 = document.querySelector('input[name="q5"]:checked'); if (q5) fields.push(['entry.1858992054', q5.value]);
      document.querySelectorAll('input[name="q6"]:checked').forEach(function(cb) { fields.push(['entry.1352587594', cb.value]); });
      const q6other = document.querySelector('textarea[name="q6_other"]').value.trim();
      if (q6other) { fields.push(['entry.1352587594', '__other_option__']); fields.push(['entry.1352587594.other_option_response', q6other]); }
      const q7 = document.querySelector('textarea[name="q7"]').value.trim(); if (q7) fields.push(['entry.2125975084', q7]);
      const q8 = document.querySelector('textarea[name="q8"]').value.trim(); if (q8) fields.push(['entry.1084122334', q8]);
      const q9 = document.querySelector('textarea[name="q9"]').value.trim(); if (q9) fields.push(['entry.1344762534', q9]);
      const tempForm = document.createElement('form');
      tempForm.method = 'POST'; tempForm.action = FORM_ACTION; tempForm.target = 'hidden_iframe'; tempForm.style.display = 'none';
      fields.forEach(function(pair) { const input = document.createElement('input'); input.type = 'hidden'; input.name = pair[0]; input.value = pair[1]; tempForm.appendChild(input); });
      document.body.appendChild(tempForm); tempForm.submit(); document.body.removeChild(tempForm);
      document.getElementById('surveyForm').style.display = 'none';
      document.getElementById('thankyou').classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
